<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero-G Shapes ECS</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-base: #09111d;
        --bg-glow-a: rgba(72, 145, 255, 0.2);
        --bg-glow-b: rgba(77, 208, 154, 0.15);
        --panel: rgba(8, 12, 20, 0.82);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.72);
        --accent: #ffd166;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, var(--bg-glow-a), transparent 28%),
          radial-gradient(circle at 84% 78%, var(--bg-glow-b), transparent 30%),
          linear-gradient(180deg, #12243b, var(--bg-base));
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(2, 4, 8, 0.62);
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .modal {
        width: min(92vw, 380px);
        padding: 28px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        text-align: center;
      }

      .modal h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .modal p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .modal button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        font: inherit;
        font-weight: 700;
        color: #101522;
        background: linear-gradient(135deg, #ffe39b, var(--accent));
        cursor: pointer;
      }

      .modal button:hover {
        filter: brightness(1.03);
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="game-over-overlay" class="overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
        <h1 id="game-over-title">Game Over</h1>
        <p id="game-over-score">Score: 0</p>
        <button id="restart-button" type="button">Начать заново</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
