<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>ECS Mini Game — Updated</title>
  <style>
    html,
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
      background: #181818;
    }

    .ui {
      position: fixed;
      left: 12px;
      top: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      user-select: none;
      min-width: 260px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="ui" id="ui"></div>

  <script>
    // ============================================================
    // 1. CANVAS
    // ============================================================

    const canvas = document.getElementById('game')
    const ctx = canvas.getContext('2d')
    const ui = document.getElementById('ui')

    function resize() {
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
    }

    window.addEventListener('resize', resize)
    resize()

    // ============================================================
    // 2. DATA-DRIVEN CONFIGS
    // ============================================================

    const FACTION = {
      PLAYER: 'player',
      ALLY: 'ally',
      ENEMY: 'enemy',
      NEUTRAL: 'neutral',
    }

    const bulletTypes = {
      pistol: {
        label: 'Pistol',
        color: '#ffffff',
        radius: 4,
        speed: 650,
        lifetime: 1.4,
        damage: 12,
        damageType: 'physical',
        destroyOnHit: true,
        effects: [],
      },

      fire: {
        label: 'Fire',
        color: '#ff6b1a',
        radius: 5,
        speed: 520,
        lifetime: 1.6,
        damage: 7,
        damageType: 'fire',
        destroyOnHit: true,
        effects: [
          {
            type: 'burn',
            duration: 3,
            damagePerSecond: 4,
          },
        ],
      },

      ice: {
        label: 'Ice',
        color: '#66ccff',
        radius: 5,
        speed: 460,
        lifetime: 1.8,
        damage: 5,
        damageType: 'ice',
        destroyOnHit: true,
        effects: [
          {
            type: 'slow',
            duration: 2,
            speedMultiplier: 0.45,
          },
        ],
      },

      armorPiercing: {
        label: 'Armor Piercing',
        color: '#d2d2d2',
        radius: 3,
        speed: 900,
        lifetime: 1.2,
        damage: 9,
        damageType: 'physical',
        armorPiercing: 0.7,
        destroyOnHit: true,
        effects: [],
      },
    }

    const enemyTypes = {
      normal: {
        label: 'Normal Enemy',
        color: '#d94b4b',
        radius: 18,
        maxHealth: 50,
        speed: 85,
        contactDamage: 8,
        shootBulletType: 'pistol',
        shootRange: 520,
        shootCooldownMin: 0.8,
        shootCooldownMax: 1.5,
        resistances: {
          physical: 1,
          fire: 1,
          ice: 1,
        },
        armor: 0,
      },

      fireDemon: {
        label: 'Fire Demon',
        color: '#b33a12',
        radius: 21,
        maxHealth: 75,
        speed: 65,
        contactDamage: 12,
        shootBulletType: 'fire',
        shootRange: 560,
        shootCooldownMin: 1.0,
        shootCooldownMax: 1.9,
        resistances: {
          physical: 1,
          fire: 0.25,
          ice: 1.6,
        },
        armor: 4,
        immuneTo: ['burn'],
      },

      iceBeast: {
        label: 'Ice Beast',
        color: '#4aa3ff',
        radius: 22,
        maxHealth: 85,
        speed: 55,
        contactDamage: 10,
        shootBulletType: 'ice',
        shootRange: 560,
        shootCooldownMin: 1.0,
        shootCooldownMax: 2.0,
        resistances: {
          physical: 1,
          fire: 1.7,
          ice: 0.25,
        },
        armor: 2,
        immuneTo: ['slow'],
      },
    }

    // ============================================================
    // 3. WORLD / ECS STORAGE
    // ============================================================

    function createWorld() {
      let nextEntityId = 1

      return {
        entities: new Set(),

        components: {
          Position: new Map(),
          Velocity: new Map(),
          Renderable: new Map(),
          Collider: new Map(),
          Health: new Map(),
          Faction: new Map(),

          PlayerControlled: new Map(),
          AllyAI: new Map(),
          EnemyAI: new Map(),

          WeaponState: new Map(),
          Projectile: new Map(),
          Damage: new Map(),
          Lifetime: new Map(),
          Explosion: new Map(),
          StatusEffects: new Map(),
          Resistance: new Map(),
          Armor: new Map(),

          Selectable: new Map(),
          Selected: new Map(),
          Name: new Map(),
        },

        createEntity() {
          const id = nextEntityId++
          this.entities.add(id)
          return id
        },

        removeEntity(id) {
          this.entities.delete(id)

          for (const componentMap of Object.values(this.components)) {
            componentMap.delete(id)
          }

          if (gameState.selectedEntityId === id) {
            gameState.mode = 'playing'
            gameState.selectedEntityId = null
          }
        },

        add(id, componentName, data) {
          this.components[componentName].set(id, data)
        },

        remove(id, componentName) {
          this.components[componentName].delete(id)
        },

        get(id, componentName) {
          return this.components[componentName].get(id)
        },

        has(id, componentName) {
          return this.components[componentName].has(id)
        },
      }
    }

    const world = createWorld()

    // ============================================================
    // 4. GAME STATE
    // ============================================================

    const gameState = {
      mode: 'playing',
      selectedEntityId: null,
    }

    // ============================================================
    // 5. EVENT BUS
    // ============================================================

    function createEventBus() {
      const events = []

      return {
        emit(event) {
          events.push(event)
        },

        drain(type) {
          const matched = []
          const rest = []

          for (const event of events) {
            if (event.type === type) {
              matched.push(event)
            } else {
              rest.push(event)
            }
          }

          events.length = 0
          events.push(...rest)

          return matched
        },

        drainAll() {
          const copy = events.slice()
          events.length = 0
          return copy
        },
      }
    }

    const events = createEventBus()

    // ============================================================
    // 6. INPUT
    // ============================================================

    const input = {
      keys: new Set(),
      keysPressed: new Set(),
      mouse: {
        x: 0,
        y: 0,
        down: false,
        clicked: false,
      },
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase()

      if (!input.keys.has(key)) {
        input.keysPressed.add(key)
      }

      input.keys.add(key)
    })

    window.addEventListener('keyup', (event) => {
      input.keys.delete(event.key.toLowerCase())
    })

    canvas.addEventListener('mousemove', (event) => {
      input.mouse.x = event.clientX
      input.mouse.y = event.clientY
    })

    canvas.addEventListener('mousedown', () => {
      input.mouse.down = true
      input.mouse.clicked = true
    })

    canvas.addEventListener('mouseup', () => {
      input.mouse.down = false
    })

    function endInputFrame() {
      input.keysPressed.clear()
      input.mouse.clicked = false
    }

    // ============================================================
    // 7. UTILS
    // ============================================================

    function length(x, y) {
      return Math.sqrt(x * x + y * y)
    }

    function normalize(x, y) {
      const len = length(x, y)

      if (len === 0) {
        return { x: 0, y: 0 }
      }

      return {
        x: x / len,
        y: y / len,
      }
    }

    function distance(a, b) {
      const dx = a.x - b.x
      const dy = a.y - b.y
      return Math.sqrt(dx * dx + dy * dy)
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min)
    }

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)]
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value))
    }

    function clearSelection() {
      for (const id of world.entities) {
        world.remove(id, 'Selected')
      }

      gameState.mode = 'playing'
      gameState.selectedEntityId = null
    }

    function isInsideCircle(point, circlePosition, radius) {
      return distance(point, circlePosition) <= radius
    }

    // ============================================================
    // 8. ENTITY FACTORIES
    // ============================================================

    let playerId = null

    function createPlayer(x, y) {
      const id = world.createEntity()

      world.add(id, 'Name', { value: 'Player' })
      world.add(id, 'Position', { x, y })
      world.add(id, 'Velocity', { x: 0, y: 0 })
      world.add(id, 'Renderable', {
        shape: 'circle',
        color: '#4ade80',
        radius: 20,
      })
      world.add(id, 'Collider', {
        type: 'circle',
        radius: 20,
      })
      world.add(id, 'Health', {
        current: 120,
        max: 120,
      })
      world.add(id, 'Faction', {
        value: FACTION.PLAYER,
      })
      world.add(id, 'PlayerControlled', {
        speed: 220,
      })
      world.add(id, 'WeaponState', {
        selectedBulletType: 'pistol',
        friendlyFire: false,
        shootCooldown: 0,
        shootInterval: 0.16,
      })
      world.add(id, 'StatusEffects', {
        list: [],
      })
      world.add(id, 'Resistance', {
        values: {
          physical: 1,
          fire: 1,
          ice: 1,
        },
      })
      world.add(id, 'Armor', {
        value: 1,
      })
      world.add(id, 'Selectable', {})

      return id
    }

    function createAlly(x, y) {
      const id = world.createEntity()

      world.add(id, 'Name', { value: 'Ally' })
      world.add(id, 'Position', { x, y })
      world.add(id, 'Velocity', { x: 0, y: 0 })
      world.add(id, 'Renderable', {
        shape: 'circle',
        color: '#22c55e',
        radius: 15,
      })
      world.add(id, 'Collider', {
        type: 'circle',
        radius: 15,
      })
      world.add(id, 'Health', {
        current: 70,
        max: 70,
      })
      world.add(id, 'Faction', {
        value: FACTION.ALLY,
      })
      world.add(id, 'AllyAI', {
        speed: 115,
        shootCooldown: randomBetween(0.1, 0.9),
      })
      world.add(id, 'StatusEffects', {
        list: [],
      })
      world.add(id, 'Resistance', {
        values: {
          physical: 1,
          fire: 1,
          ice: 1,
        },
      })
      world.add(id, 'Armor', {
        value: 0,
      })
      world.add(id, 'Selectable', {})

      return id
    }

    function createEnemy(type, x, y) {
      const config = enemyTypes[type]
      const id = world.createEntity()

      world.add(id, 'Name', { value: config.label })
      world.add(id, 'Position', { x, y })
      world.add(id, 'Velocity', { x: 0, y: 0 })
      world.add(id, 'Renderable', {
        shape: 'circle',
        color: config.color,
        radius: config.radius,
      })
      world.add(id, 'Collider', {
        type: 'circle',
        radius: config.radius,
      })
      world.add(id, 'Health', {
        current: config.maxHealth,
        max: config.maxHealth,
      })
      world.add(id, 'Faction', {
        value: FACTION.ENEMY,
      })
      world.add(id, 'EnemyAI', {
        type,
        speed: config.speed,
        contactDamage: config.contactDamage,
        shootBulletType: config.shootBulletType,
        shootRange: config.shootRange,
        shootCooldownMin: config.shootCooldownMin,
        shootCooldownMax: config.shootCooldownMax,
        attackCooldown: randomBetween(0.3, 1.2),
        shootCooldown: randomBetween(config.shootCooldownMin, config.shootCooldownMax),
        moveTimer: 0,
        moveDirection: { x: 0, y: 0 },
      })
      world.add(id, 'StatusEffects', {
        list: [],
      })
      world.add(id, 'Resistance', {
        values: config.resistances,
        immuneTo: config.immuneTo ?? [],
      })
      world.add(id, 'Armor', {
        value: config.armor,
      })
      world.add(id, 'Selectable', {})

      return id
    }

    function createBullet(type, options) {
      const config = bulletTypes[type]
      const id = world.createEntity()
      const direction = normalize(options.direction.x, options.direction.y)

      world.add(id, 'Name', { value: `${type} bullet` })
      world.add(id, 'Position', {
        x: options.x,
        y: options.y,
      })
      world.add(id, 'Velocity', {
        x: direction.x * config.speed,
        y: direction.y * config.speed,
      })
      world.add(id, 'Renderable', {
        shape: 'circle',
        color: config.color,
        radius: config.radius,
      })
      world.add(id, 'Collider', {
        type: 'circle',
        radius: config.radius,
      })
      world.add(id, 'Faction', {
        value: options.faction,
      })
      world.add(id, 'Projectile', {
        bulletType: type,
        ownerId: options.ownerId,
        destroyOnHit: config.destroyOnHit,
        friendlyFire: options.friendlyFire,
        canHitOwner: false,
      })
      world.add(id, 'Damage', {
        value: config.damage,
        damageType: config.damageType,
        armorPiercing: config.armorPiercing ?? 0,
        effects: config.effects,
      })
      world.add(id, 'Lifetime', {
        remaining: config.lifetime,
      })

      return id
    }

    function createExplosion(x, y) {
      const id = world.createEntity()
      const duration = 0.25

      world.add(id, 'Position', { x, y })
      world.add(id, 'Renderable', {
        shape: 'ring',
        color: '#ffcc00',
        radius: 8,
      })
      world.add(id, 'Explosion', {
        duration,
        startRadius: 8,
        endRadius: 34,
      })
      world.add(id, 'Lifetime', {
        remaining: duration,
      })

      return id
    }

    // ============================================================
    // 9. GAME RULES
    // ============================================================

    function areFriendly(factionA, factionB) {
      if (factionA === factionB) return true

      const playerSide =
        factionA === FACTION.PLAYER || factionA === FACTION.ALLY

      const otherPlayerSide =
        factionB === FACTION.PLAYER || factionB === FACTION.ALLY

      return playerSide && otherPlayerSide
    }

    function canProjectileHit(projectileId, targetId) {
      const projectile = world.get(projectileId, 'Projectile')
      const projectileFaction = world.get(projectileId, 'Faction')
      const targetFaction = world.get(targetId, 'Faction')

      if (!projectile || !projectileFaction || !targetFaction) {
        return false
      }

      if (projectile.ownerId === targetId && !projectile.canHitOwner) {
        return false
      }

      const friendly = areFriendly(projectileFaction.value, targetFaction.value)

      if (friendly && !projectile.friendlyFire) {
        return false
      }

      return true
    }

    function calculateDamage(projectileId, targetId) {
      const damage = world.get(projectileId, 'Damage')
      const resistance = world.get(targetId, 'Resistance')
      const armor = world.get(targetId, 'Armor')

      if (!damage) return 0

      const resistanceMultiplier =
        resistance?.values?.[damage.damageType] ?? 1

      const raw = damage.value * resistanceMultiplier

      const armorValue = armor?.value ?? 0
      const armorPiercing = damage.armorPiercing ?? 0
      const effectiveArmor = armorValue * (1 - armorPiercing)

      return Math.max(1, raw - effectiveArmor)
    }

    function applyStatusEffect(targetId, effect) {
      const statusEffects = world.get(targetId, 'StatusEffects')
      const resistance = world.get(targetId, 'Resistance')

      if (!statusEffects) return

      if (resistance?.immuneTo?.includes(effect.type)) {
        return
      }

      statusEffects.list.push({
        ...effect,
        remaining: effect.duration,
        tickTimer: 0,
      })
    }

    function getNearestEnemy(position, maxDistance = Infinity) {
      let nearestEnemy = null
      let nearestDistance = maxDistance

      for (const id of world.entities) {
        if (!world.has(id, 'EnemyAI')) continue
        if (!world.has(id, 'Health')) continue

        const enemyPosition = world.get(id, 'Position')
        const dist = distance(position, enemyPosition)

        if (dist < nearestDistance) {
          nearestEnemy = id
          nearestDistance = dist
        }
      }

      return nearestEnemy
    }

    function getPlayerTargetForEnemy(position, maxDistance) {
      const playerPosition = world.get(playerId, 'Position')
      const playerHealth = world.get(playerId, 'Health')

      if (!playerPosition || !playerHealth) return null

      if (distance(position, playerPosition) > maxDistance) return null

      return playerId
    }

    // ============================================================
    // 10. SYSTEMS
    // ============================================================

    function weaponSelectionSystem() {
      const weapon = world.get(playerId, 'WeaponState')

      if (!weapon) return

      if (input.keysPressed.has('1')) weapon.selectedBulletType = 'pistol'
      if (input.keysPressed.has('2')) weapon.selectedBulletType = 'fire'
      if (input.keysPressed.has('3')) weapon.selectedBulletType = 'ice'
      if (input.keysPressed.has('4')) weapon.selectedBulletType = 'armorPiercing'

      if (input.keysPressed.has('f')) {
        weapon.friendlyFire = !weapon.friendlyFire
      }
    }

    function selectionSystem() {
      if (!input.mouse.clicked) return

      const mousePosition = {
        x: input.mouse.x,
        y: input.mouse.y,
      }

      let selectedEntity = null

      for (const id of world.entities) {
        if (!world.has(id, 'Selectable')) continue
        if (!world.has(id, 'Position')) continue
        if (!world.has(id, 'Collider')) continue

        const position = world.get(id, 'Position')
        const collider = world.get(id, 'Collider')

        if (isInsideCircle(mousePosition, position, collider.radius)) {
          selectedEntity = id
        }
      }

      if (!selectedEntity) return

      clearSelection()
      world.add(selectedEntity, 'Selected', {})
      gameState.mode = 'objectSelected'
      gameState.selectedEntityId = selectedEntity
    }

    function playerControlSystem(dt) {
      if (gameState.mode !== 'playing') return

      for (const id of world.entities) {
        if (!world.has(id, 'PlayerControlled')) continue

        const velocity = world.get(id, 'Velocity')
        const control = world.get(id, 'PlayerControlled')

        let dx = 0
        let dy = 0

        if (input.keys.has('w') || input.keys.has('arrowup')) dy -= 1
        if (input.keys.has('s') || input.keys.has('arrowdown')) dy += 1
        if (input.keys.has('a') || input.keys.has('arrowleft')) dx -= 1
        if (input.keys.has('d') || input.keys.has('arrowright')) dx += 1

        const direction = normalize(dx, dy)

        velocity.x = direction.x * control.speed
        velocity.y = direction.y * control.speed
      }
    }

    function selectedObjectControlSystem(dt) {
      if (gameState.mode !== 'objectSelected') return

      const id = gameState.selectedEntityId
      if (!id) return

      if (input.keysPressed.has('escape')) {
        clearSelection()
        return
      }

      if (input.keysPressed.has('delete') || input.keysPressed.has('backspace')) {
        world.removeEntity(id)
        return
      }

      const velocity = world.get(id, 'Velocity')
      if (!velocity) return

      let dx = 0
      let dy = 0

      if (input.keys.has('w') || input.keys.has('arrowup')) dy -= 1
      if (input.keys.has('s') || input.keys.has('arrowdown')) dy += 1
      if (input.keys.has('a') || input.keys.has('arrowleft')) dx -= 1
      if (input.keys.has('d') || input.keys.has('arrowright')) dx += 1

      const direction = normalize(dx, dy)

      velocity.x = direction.x * 180
      velocity.y = direction.y * 180
    }

    function shootingSystem(dt) {
      if (gameState.mode !== 'playing') return

      for (const id of world.entities) {
        if (!world.has(id, 'PlayerControlled')) continue
        if (!world.has(id, 'WeaponState')) continue

        const position = world.get(id, 'Position')
        const faction = world.get(id, 'Faction')
        const weapon = world.get(id, 'WeaponState')

        weapon.shootCooldown -= dt

        if (!input.mouse.down) continue
        if (weapon.shootCooldown > 0) continue

        const aim = normalize(
          input.mouse.x - position.x,
          input.mouse.y - position.y,
        )

        createBullet(weapon.selectedBulletType, {
          x: position.x + aim.x * 28,
          y: position.y + aim.y * 28,
          direction: aim,
          ownerId: id,
          faction: faction.value,
          friendlyFire: weapon.friendlyFire,
        })

        weapon.shootCooldown = weapon.shootInterval
      }
    }

    function allyAISystem(dt) {
      for (const id of world.entities) {
        if (!world.has(id, 'AllyAI')) continue

        const position = world.get(id, 'Position')
        const velocity = world.get(id, 'Velocity')
        const ally = world.get(id, 'AllyAI')
        const faction = world.get(id, 'Faction')

        const playerPosition = world.get(playerId, 'Position')

        if (playerPosition) {
          const toPlayer = normalize(
            playerPosition.x - position.x,
            playerPosition.y - position.y,
          )

          const distToPlayer = distance(position, playerPosition)

          if (distToPlayer > 130) {
            velocity.x = toPlayer.x * ally.speed
            velocity.y = toPlayer.y * ally.speed
          } else {
            velocity.x = 0
            velocity.y = 0
          }
        }

        ally.shootCooldown -= dt

        if (ally.shootCooldown <= 0) {
          const nearestEnemy = getNearestEnemy(position, 420)

          if (nearestEnemy) {
            const targetPosition = world.get(nearestEnemy, 'Position')
            const direction = normalize(
              targetPosition.x - position.x,
              targetPosition.y - position.y,
            )

            createBullet('pistol', {
              x: position.x + direction.x * 24,
              y: position.y + direction.y * 24,
              direction,
              ownerId: id,
              faction: faction.value,
              friendlyFire: false,
            })
          }

          ally.shootCooldown = randomBetween(0.45, 0.95)
        }
      }
    }

    function enemyAISystem(dt) {
      for (const id of world.entities) {
        if (!world.has(id, 'EnemyAI')) continue

        const position = world.get(id, 'Position')
        const velocity = world.get(id, 'Velocity')
        const enemy = world.get(id, 'EnemyAI')
        const faction = world.get(id, 'Faction')

        enemy.moveTimer -= dt

        if (enemy.moveTimer <= 0) {
          const angle = Math.random() * Math.PI * 2

          enemy.moveDirection = {
            x: Math.cos(angle),
            y: Math.sin(angle),
          }

          enemy.moveTimer = randomBetween(0.7, 2.0)
        }

        let speedMultiplier = 1
        const statusEffects = world.get(id, 'StatusEffects')

        if (statusEffects) {
          for (const effect of statusEffects.list) {
            if (effect.type === 'slow') {
              speedMultiplier *= effect.speedMultiplier
            }
          }
        }

        velocity.x = enemy.moveDirection.x * enemy.speed * speedMultiplier
        velocity.y = enemy.moveDirection.y * enemy.speed * speedMultiplier

        enemy.shootCooldown -= dt

        const targetId = getPlayerTargetForEnemy(position, enemy.shootRange)

        if (targetId && enemy.shootCooldown <= 0) {
          const targetPosition = world.get(targetId, 'Position')
          const direction = normalize(
            targetPosition.x - position.x,
            targetPosition.y - position.y,
          )

          createBullet(enemy.shootBulletType, {
            x: position.x + direction.x * 26,
            y: position.y + direction.y * 26,
            direction,
            ownerId: id,
            faction: faction.value,
            friendlyFire: false,
          })

          enemy.shootCooldown = randomBetween(
            enemy.shootCooldownMin,
            enemy.shootCooldownMax,
          )
        }

        enemy.attackCooldown -= dt

        if (targetId) {
          const playerPosition = world.get(targetId, 'Position')

          if (
            distance(position, playerPosition) < 34 &&
            enemy.attackCooldown <= 0
          ) {
            events.emit({
              type: 'damage',
              sourceId: id,
              targetId,
              amount: enemy.contactDamage,
              damageType: 'physical',
            })

            enemy.attackCooldown = 0.8
          }
        }
      }
    }

    function movementSystem(dt) {
      for (const id of world.entities) {
        const position = world.get(id, 'Position')
        const velocity = world.get(id, 'Velocity')

        if (!position || !velocity) continue

        position.x += velocity.x * dt
        position.y += velocity.y * dt

        const collider = world.get(id, 'Collider')

        if (collider) {
          position.x = clamp(position.x, collider.radius, canvas.width - collider.radius)
          position.y = clamp(position.y, collider.radius, canvas.height - collider.radius)
        }
      }
    }

    function collisionSystem() {
      const collidable = [...world.entities].filter((id) => {
        return world.has(id, 'Position') && world.has(id, 'Collider')
      })

      for (let i = 0; i < collidable.length; i++) {
        for (let j = i + 1; j < collidable.length; j++) {
          const a = collidable[i]
          const b = collidable[j]

          const positionA = world.get(a, 'Position')
          const positionB = world.get(b, 'Position')
          const colliderA = world.get(a, 'Collider')
          const colliderB = world.get(b, 'Collider')

          const minDistance = colliderA.radius + colliderB.radius

          if (distance(positionA, positionB) <= minDistance) {
            events.emit({
              type: 'collision',
              a,
              b,
            })
          }
        }
      }
    }

    function projectileHitSystem() {
      const collisions = events.drain('collision')

      for (const collision of collisions) {
        handlePossibleProjectileHit(collision.a, collision.b)
        handlePossibleProjectileHit(collision.b, collision.a)
      }
    }

    function handlePossibleProjectileHit(projectileId, targetId) {
      if (!world.has(projectileId, 'Projectile')) return
      if (!world.has(targetId, 'Health')) return

      if (!canProjectileHit(projectileId, targetId)) {
        return
      }

      const position = world.get(projectileId, 'Position')
      const projectile = world.get(projectileId, 'Projectile')
      const damage = world.get(projectileId, 'Damage')

      const amount = calculateDamage(projectileId, targetId)

      events.emit({
        type: 'damage',
        sourceId: projectileId,
        targetId,
        amount,
        damageType: damage.damageType,
      })

      for (const effect of damage.effects) {
        events.emit({
          type: 'apply-effect',
          sourceId: projectileId,
          targetId,
          effect,
        })
      }

      if (position) {
        createExplosion(position.x, position.y)
      }

      if (projectile.destroyOnHit) {
        world.removeEntity(projectileId)
      }
    }

    function damageSystem() {
      const damageEvents = events.drain('damage')

      for (const event of damageEvents) {
        const health = world.get(event.targetId, 'Health')

        if (!health) continue

        health.current -= event.amount

        if (health.current <= 0) {
          events.emit({
            type: 'death',
            entityId: event.targetId,
            sourceId: event.sourceId,
          })
        }
      }
    }

    function statusEffectSystem(dt) {
      const applyEvents = events.drain('apply-effect')

      for (const event of applyEvents) {
        applyStatusEffect(event.targetId, event.effect)
      }

      for (const id of world.entities) {
        const statusEffects = world.get(id, 'StatusEffects')
        const health = world.get(id, 'Health')

        if (!statusEffects) continue

        for (const effect of statusEffects.list) {
          effect.remaining -= dt

          if (effect.type === 'burn' && health) {
            effect.tickTimer += dt

            if (effect.tickTimer >= 0.5) {
              const damage = effect.damagePerSecond * effect.tickTimer

              events.emit({
                type: 'damage',
                sourceId: null,
                targetId: id,
                amount: damage,
                damageType: 'fire',
              })

              effect.tickTimer = 0
            }
          }
        }

        statusEffects.list = statusEffects.list.filter((effect) => {
          return effect.remaining > 0
        })
      }
    }

    function deathSystem() {
      const deathEvents = events.drain('death')

      for (const event of deathEvents) {
        if (event.entityId === playerId) {
          restartGame()
          return
        }

        const position = world.get(event.entityId, 'Position')

        if (position) {
          createExplosion(position.x, position.y)
        }

        world.removeEntity(event.entityId)
      }
    }

    function explosionAnimationSystem() {
      for (const id of world.entities) {
        const explosion = world.get(id, 'Explosion')
        const lifetime = world.get(id, 'Lifetime')
        const renderable = world.get(id, 'Renderable')

        if (!explosion || !lifetime || !renderable) continue

        const progress = 1 - lifetime.remaining / explosion.duration

        renderable.radius =
          explosion.startRadius +
          progress * (explosion.endRadius - explosion.startRadius)
      }
    }

    function lifetimeSystem(dt) {
      for (const id of [...world.entities]) {
        const lifetime = world.get(id, 'Lifetime')

        if (!lifetime) continue

        lifetime.remaining -= dt

        if (lifetime.remaining <= 0) {
          world.removeEntity(id)
        }
      }
    }

    function spawnSystem(dt) {
      spawnSystem.timer -= dt

      if (spawnSystem.timer > 0) return

      const side = Math.floor(Math.random() * 4)
      let x = 0
      let y = 0

      if (side === 0) {
        x = randomBetween(0, canvas.width)
        y = 24
      } else if (side === 1) {
        x = canvas.width - 24
        y = randomBetween(0, canvas.height)
      } else if (side === 2) {
        x = randomBetween(0, canvas.width)
        y = canvas.height - 24
      } else {
        x = 24
        y = randomBetween(0, canvas.height)
      }

      const type = randomFrom(['normal', 'normal', 'normal', 'fireDemon', 'iceBeast'])

      createEnemy(type, x, y)

      spawnSystem.timer = randomBetween(1.2, 2.0)
    }

    spawnSystem.timer = 1

    function renderSystem() {
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      drawGrid()

      for (const id of world.entities) {
        const position = world.get(id, 'Position')
        const renderable = world.get(id, 'Renderable')

        if (!position || !renderable) continue

        if (renderable.shape === 'circle') {
          ctx.beginPath()
          ctx.arc(position.x, position.y, renderable.radius, 0, Math.PI * 2)
          ctx.fillStyle = renderable.color
          ctx.fill()
        }

        if (renderable.shape === 'ring') {
          ctx.beginPath()
          ctx.arc(position.x, position.y, renderable.radius, 0, Math.PI * 2)
          ctx.strokeStyle = renderable.color
          ctx.lineWidth = 3
          ctx.stroke()
        }

        drawSelection(id)
        drawHealthBar(id)
        drawStatusEffects(id)
      }

      drawAimLine()
      drawUI()
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)'
      ctx.lineWidth = 1

      const size = 40

      for (let x = 0; x < canvas.width; x += size) {
        ctx.beginPath()
        ctx.moveTo(x, 0)
        ctx.lineTo(x, canvas.height)
        ctx.stroke()
      }

      for (let y = 0; y < canvas.height; y += size) {
        ctx.beginPath()
        ctx.moveTo(0, y)
        ctx.lineTo(canvas.width, y)
        ctx.stroke()
      }
    }

    function drawSelection(id) {
      if (!world.has(id, 'Selected')) return

      const position = world.get(id, 'Position')
      const collider = world.get(id, 'Collider')

      if (!position || !collider) return

      ctx.beginPath()
      ctx.arc(position.x, position.y, collider.radius + 7, 0, Math.PI * 2)
      ctx.strokeStyle = '#facc15'
      ctx.lineWidth = 3
      ctx.stroke()
    }

    function drawHealthBar(id) {
      const position = world.get(id, 'Position')
      const health = world.get(id, 'Health')
      const collider = world.get(id, 'Collider')

      if (!position || !health || !collider) return

      const width = collider.radius * 2
      const height = 5
      const x = position.x - width / 2
      const y = position.y - collider.radius - 12

      const ratio = clamp(health.current / health.max, 0, 1)

      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'
      ctx.fillRect(x, y, width, height)

      ctx.fillStyle = ratio > 0.5 ? '#22c55e' : ratio > 0.25 ? '#facc15' : '#ef4444'
      ctx.fillRect(x, y, width * ratio, height)
    }

    function drawStatusEffects(id) {
      const position = world.get(id, 'Position')
      const collider = world.get(id, 'Collider')
      const statusEffects = world.get(id, 'StatusEffects')

      if (!position || !collider || !statusEffects) return

      let offset = 0

      for (const effect of statusEffects.list) {
        ctx.fillStyle = effect.type === 'burn' ? '#ff6b1a' : '#66ccff'
        ctx.beginPath()
        ctx.arc(
          position.x - collider.radius + 5 + offset,
          position.y + collider.radius + 10,
          4,
          0,
          Math.PI * 2,
        )
        ctx.fill()

        offset += 10
      }
    }

    function drawAimLine() {
      if (gameState.mode !== 'playing') return

      const position = world.get(playerId, 'Position')

      if (!position) return

      ctx.beginPath()
      ctx.moveTo(position.x, position.y)
      ctx.lineTo(input.mouse.x, input.mouse.y)
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'
      ctx.lineWidth = 1
      ctx.stroke()
    }

    function drawUI() {
      const playerHealth = world.get(playerId, 'Health')
      const weapon = world.get(playerId, 'WeaponState')
      const selected = bulletTypes[weapon?.selectedBulletType ?? 'pistol']

      const enemyCount = [...world.entities].filter((id) => {
        return world.has(id, 'EnemyAI')
      }).length

      const allyCount = [...world.entities].filter((id) => {
        return world.has(id, 'AllyAI')
      }).length

      const selectedName = gameState.selectedEntityId
        ? world.get(gameState.selectedEntityId, 'Name')?.value ?? gameState.selectedEntityId
        : 'none'

      ui.innerHTML = `
        <b>ECS Mini Game — Updated</b><br/>
        Mode: ${gameState.mode}<br/>
        Selected: ${selectedName}<br/>
        HP: ${Math.max(0, Math.round(playerHealth?.current ?? 0))} / ${playerHealth?.max ?? 0}<br/>
        Bullet: ${selected.label} <span style="color:${selected.color}">●</span><br/>
        Friendly fire: ${weapon?.friendlyFire ? 'ON' : 'OFF'}<br/>
        Enemies: ${enemyCount}<br/>
        Allies: ${allyCount}<br/>
        <br/>
        <b>Playing mode</b><br/>
        WASD / Arrows — move player<br/>
        Mouse — aim<br/>
        LMB — shoot / select object<br/>
        1/2/3/4 — bullet type<br/>
        F — friendly fire<br/>
        <br/>
        <b>Object selected mode</b><br/>
        WASD / Arrows — move selected object<br/>
        Esc — unselect<br/>
        Delete — remove selected object
      `
    }

    // ============================================================
    // 11. INIT / RESTART
    // ============================================================

    function clearWorld() {
      for (const id of [...world.entities]) {
        world.removeEntity(id)
      }
    }

    function restartGame() {
      clearWorld()
      clearSelection()

      playerId = createPlayer(canvas.width / 2, canvas.height / 2)

      createAlly(canvas.width / 2 - 80, canvas.height / 2 + 70)
      createAlly(canvas.width / 2 + 80, canvas.height / 2 + 70)

      for (let i = 0; i < 6; i++) {
        createEnemy(
          randomFrom(['normal', 'fireDemon', 'iceBeast']),
          randomBetween(80, canvas.width - 80),
          randomBetween(80, canvas.height - 80),
        )
      }
    }

    restartGame()

    // ============================================================
    // 12. GAME LOOP
    // ============================================================

    let lastTime = performance.now()

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033)
      lastTime = now

      weaponSelectionSystem()
      selectionSystem()

      playerControlSystem(dt)
      selectedObjectControlSystem(dt)
      shootingSystem(dt)

      allyAISystem(dt)
      enemyAISystem(dt)

      movementSystem(dt)
      collisionSystem()
      projectileHitSystem()

      statusEffectSystem(dt)
      damageSystem()
      deathSystem()

      explosionAnimationSystem()
      lifetimeSystem(dt)
      spawnSystem(dt)

      renderSystem()
      endInputFrame()

      requestAnimationFrame(loop)
    }

    requestAnimationFrame(loop)
  </script>
</body>
