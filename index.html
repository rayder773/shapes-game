<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>AntiMatch</title>
    <meta name="theme-color" content="#09111d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: dark;
        --app-width: 100vw;
        --app-height: 100vh;
        --bg-base: #09111d;
        --bg-glow-a: rgba(72, 145, 255, 0.2);
        --bg-glow-b: rgba(77, 208, 154, 0.15);
        --panel: rgba(8, 12, 20, 0.82);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.72);
        --accent: #ffd166;
        --life: #b894ff;
        --life-glow: rgba(184, 148, 255, 0.38);
        --coin: #ffd166;
        --coin-deep: #ffb347;
        --coin-glow: rgba(255, 209, 102, 0.44);
        --safe-top: max(16px, env(safe-area-inset-top));
        --safe-right: max(16px, env(safe-area-inset-right));
        --safe-bottom: max(16px, env(safe-area-inset-bottom));
        --safe-left: max(16px, env(safe-area-inset-left));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        width: var(--app-width);
        height: var(--app-height);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        background:
          radial-gradient(circle at 18% 18%, var(--bg-glow-a), transparent 28%),
          radial-gradient(circle at 84% 78%, var(--bg-glow-b), transparent 30%),
          linear-gradient(180deg, #12243b, var(--bg-base));
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: fixed;
        top: var(--safe-top);
        left: var(--safe-left);
        right: var(--safe-right);
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        pointer-events: none;
      }

      .hud-panel {
        max-width: min(70vw, 560px);
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(8, 12, 20, 0.28);
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
      }

      .hud-score {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .hud-stats {
        display: grid;
        gap: 10px;
      }

      .hud-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        min-height: 24px;
      }

      .hud-best {
        display: inline-flex;
        align-items: baseline;
        gap: 8px;
        min-height: 24px;
        padding: 6px 10px;
        border: 1px solid rgba(255, 209, 102, 0.2);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(255, 209, 102, 0.04)),
          rgba(255, 255, 255, 0.03);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 0 18px rgba(255, 209, 102, 0.08);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 242, 210, 0.95);
      }

      .hud-best-label {
        color: rgba(255, 230, 172, 0.72);
      }

      .hud-best-value {
        font-size: 1rem;
        color: rgba(255, 246, 220, 0.98);
        text-shadow: 0 0 14px rgba(255, 209, 102, 0.28);
        font-variant-numeric: tabular-nums;
      }

      .hud-coins {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 24px;
        font-size: 0.98rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(255, 235, 188, 0.96);
        font-variant-numeric: tabular-nums;
      }

      .hud-coins[data-pulse="true"] {
        animation: hud-coins-pulse 360ms ease;
      }

      .hud-coin-icon {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        color: rgba(255, 209, 102, 0.96);
        filter: drop-shadow(0 0 10px rgba(255, 209, 102, 0.22));
      }

      .hud-coin-icon svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .hud-coin-label {
        color: rgba(244, 247, 251, 0.72);
      }

      .hud-coin-value {
        color: rgba(255, 238, 194, 0.98);
        text-shadow: 0 0 12px rgba(255, 209, 102, 0.3);
      }

      .hud-lives {
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        transform-origin: left center;
      }

      .hud-lives[data-pulse="true"] {
        animation: hud-lives-pulse 320ms ease;
      }

      .hud-life {
        display: inline-flex;
        width: 16px;
        height: 16px;
        color: rgba(184, 148, 255, 0.26);
        text-shadow: 0 0 0 transparent;
        transition: color 120ms ease, text-shadow 120ms ease, transform 120ms ease;
      }

      .hud-life svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .hud-life[data-filled="true"] {
        color: var(--life);
        text-shadow: 0 0 12px var(--life-glow);
      }

      .icon-button,
      .modal button {
        appearance: none;
        border: 0;
        font: inherit;
        cursor: pointer;
        touch-action: manipulation;
      }

      .icon-button {
        min-width: 56px;
        min-height: 56px;
        border-radius: 18px;
        padding: 0 18px;
        font-weight: 800;
        color: rgba(255, 247, 223, 0.96);
        background: rgba(255, 209, 102, 0.22);
        border: 1px solid rgba(255, 209, 102, 0.42);
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
      }

      .icon-button:active,
      .modal button:active {
        transform: translateY(1px) scale(0.99);
      }

      .overlay {
        z-index: 4;
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(2, 4, 8, 0.62);
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .overlay[data-layout="sheet"] {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding:
          calc(var(--safe-top) + 16px)
          calc(var(--safe-right) + 16px)
          calc(var(--safe-bottom) + 10px)
          calc(var(--safe-left) + 16px);
      }

      .modal {
        width: min(100%, 380px);
        margin-inline: auto;
        padding: 28px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        text-align: center;
        touch-action: manipulation;
      }

      .overlay[data-layout="sheet"] .modal {
        width: min(100%, 460px);
        border-radius: 26px 26px 18px 18px;
        padding: 24px 22px 20px;
        text-align: left;
        animation: install-sheet-in 180ms ease;
      }

      .overlay[data-variant="ios-hint"] .modal,
      .overlay[data-variant="ios-hint"] .modal p {
        text-align: center;
      }

      .overlay[data-variant="ios-hint"] .overlay-tips {
        margin-inline: auto;
        width: fit-content;
      }

      .modal h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .modal p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.45;
        white-space: pre-line;
      }

      .overlay[data-variant="record"] .modal {
        border-color: rgba(255, 209, 102, 0.48);
        box-shadow: 0 24px 90px rgba(255, 209, 102, 0.16), 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      .overlay[data-variant="record"] .modal p {
        color: rgba(255, 237, 187, 0.96);
        font-weight: 700;
      }

      .overlay[data-variant="results"] .modal,
      .overlay[data-variant="results-record"] .modal {
        width: min(100%, 520px);
        padding: 30px 24px 24px;
        text-align: left;
        border-radius: 28px;
        background:
          radial-gradient(circle at top, rgba(74, 148, 255, 0.16), transparent 38%),
          linear-gradient(180deg, rgba(9, 17, 29, 0.96), rgba(8, 12, 20, 0.96));
      }

      .overlay[data-variant="results-record"] .modal {
        border-color: rgba(255, 209, 102, 0.48);
        box-shadow: 0 24px 90px rgba(255, 209, 102, 0.14), 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      .overlay-tips {
        margin: -8px 0 22px;
        padding-left: 20px;
        color: rgba(244, 247, 251, 0.84);
        text-align: left;
        line-height: 1.5;
      }

      .overlay-tips[hidden] {
        display: none;
      }

      .overlay[data-layout="sheet"] .overlay-tips {
        margin: -6px 0 18px;
      }

      .modal button {
        border-radius: 999px;
        padding: 12px 22px;
        font-weight: 700;
        color: #101522;
        background: linear-gradient(135deg, #ffe39b, var(--accent));
      }

      .modal button:hover {
        filter: brightness(1.03);
      }

      .modal-actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .modal-footer {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        justify-items: center;
        gap: 10px;
      }

      .modal-footer[hidden] {
        display: none;
      }

      .modal-footer p {
        margin: 0;
        max-width: 29ch;
        color: rgba(244, 247, 251, 0.62);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .modal-footer button {
        padding: 9px 16px;
        font-size: 0.95rem;
      }

      .overlay[data-layout="sheet"] .modal-actions {
        justify-content: stretch;
      }

      .modal button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.12);
      }

      .results-screen[hidden] {
        display: none;
      }

      .results-screen {
        position: relative;
        margin: 2px 0 22px;
      }

      .results-grid {
        display: grid;
        gap: 10px;
      }

      .results-row {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 220ms ease,
          transform 220ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .results-row.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .results-row.is-accent {
        border-color: rgba(255, 209, 102, 0.28);
        box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.08) inset;
      }

      .results-row-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: rgba(244, 247, 251, 0.78);
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .results-row-value {
        font-size: clamp(1.1rem, 3vw, 1.5rem);
        font-weight: 800;
        color: rgba(247, 250, 255, 0.98);
        font-variant-numeric: tabular-nums;
      }

      .results-row-value.is-coin {
        color: rgba(255, 235, 188, 0.98);
        text-shadow: 0 0 16px rgba(255, 209, 102, 0.2);
      }

      .results-final {
        position: relative;
        overflow: hidden;
        margin-top: 14px;
        padding: 18px 18px 20px;
        border-radius: 22px;
        border: 1px solid rgba(255, 209, 102, 0.22);
        background:
          linear-gradient(135deg, rgba(255, 209, 102, 0.14), transparent 52%),
          rgba(255, 255, 255, 0.03);
        opacity: 0;
        transform: translateY(14px) scale(0.985);
        transition:
          opacity 260ms ease,
          transform 260ms ease,
          box-shadow 200ms ease;
      }

      .results-final.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        box-shadow: 0 18px 42px rgba(255, 209, 102, 0.12);
      }

      .results-final-label {
        color: rgba(255, 243, 213, 0.74);
        font-size: 0.88rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .results-final-value {
        margin-top: 10px;
        font-size: clamp(2.6rem, 10vw, 4.6rem);
        font-weight: 900;
        line-height: 1;
        color: rgba(255, 244, 220, 0.98);
        text-shadow:
          0 0 24px rgba(255, 209, 102, 0.18),
          0 0 42px rgba(255, 179, 71, 0.2);
        font-variant-numeric: tabular-nums;
      }

      .results-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 16px;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .results-meta.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .results-best {
        color: rgba(244, 247, 251, 0.72);
        font-size: 0.95rem;
        letter-spacing: 0.04em;
      }

      .results-best strong {
        color: rgba(247, 250, 255, 0.98);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      .results-record-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 209, 102, 0.42);
        color: rgba(255, 244, 220, 0.98);
        background: rgba(255, 209, 102, 0.12);
        box-shadow: 0 0 18px rgba(255, 209, 102, 0.14);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .results-record-badge[hidden] {
        display: none;
      }

      .results-burst {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .results-burst-particle {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 245, 223, 0.98), rgba(255, 209, 102, 0.32));
        box-shadow: 0 0 16px rgba(255, 209, 102, 0.36);
        animation: result-burst 620ms ease-out forwards;
      }

      @keyframes result-burst {
        from {
          opacity: 0.95;
          transform: translate(-50%, -50%) translate(0, 0) scale(1);
        }

        to {
          opacity: 0;
          transform:
            translate(-50%, -50%)
            translate(var(--burst-x, 0), var(--burst-y, 0))
            scale(0.2);
        }
      }

      @keyframes install-sheet-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes hud-lives-pulse {
        0% {
          transform: scale(1);
        }

        45% {
          transform: scale(1.08);
        }

        100% {
          transform: scale(1);
        }
      }

      @keyframes hud-coins-pulse {
        0% {
          transform: scale(1);
          filter: brightness(1);
        }

        45% {
          transform: scale(1.06);
          filter: brightness(1.08);
        }

        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }

      .app-hidden {
        display: none !important;
      }

      .modal button[hidden] {
        display: none;
      }

      .settings-page {
        width: 100%;
        min-height: var(--app-height);
        display: grid;
        place-items: center;
        padding:
          calc(var(--safe-top) + 12px)
          calc(var(--safe-right) + 12px)
          calc(var(--safe-bottom) + 12px)
          calc(var(--safe-left) + 12px);
      }

      .settings-card {
        width: min(100%, 520px);
        max-height: calc(var(--app-height) - var(--safe-top) - var(--safe-bottom) - 24px);
        padding: 28px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        overscroll-behavior: contain;
      }

      .settings-title {
        margin: 0 0 10px;
        font-size: clamp(1.9rem, 4vw, 2.5rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .settings-subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.45;
      }

      .settings-form {
        display: grid;
        gap: 18px;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
      }

      .settings-slider {
        display: grid;
        gap: 10px;
      }

      .settings-slider-label {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        font-weight: 700;
      }

      .settings-slider-value {
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .settings-slider input[type="range"] {
        width: 100%;
        margin: 0;
        accent-color: var(--accent);
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
        padding-top: 18px;
        background: linear-gradient(180deg, rgba(8, 12, 20, 0), rgba(8, 12, 20, 0.96) 26%);
        position: sticky;
        bottom: 0;
      }

      .settings-button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        font: inherit;
        font-weight: 700;
        color: #101522;
        background: linear-gradient(135deg, #ffe39b, var(--accent));
        cursor: pointer;
        touch-action: manipulation;
      }

      .settings-button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.12);
      }

      .settings-button:active {
        transform: translateY(1px) scale(0.99);
      }

      @media (max-width: 720px) {
        .hud {
          gap: 12px;
        }

        .hud-panel {
          max-width: none;
          flex: 1;
        }

        .settings-card {
          padding: 24px 18px;
        }

        .settings-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .modal-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .modal button,
        .settings-button {
          width: 100%;
        }
      }

      @media (pointer: coarse), (hover: none) {
        .hud {
          align-items: center;
          gap: 10px;
        }

        .hud-panel {
          max-width: min(56vw, 220px);
          padding: 10px 12px;
          border-radius: 14px;
          background: rgba(8, 12, 20, 0.22);
          box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .hud-score {
          font-size: 0.9rem;
          letter-spacing: 0.03em;
        }

        .hud-row {
          gap: 8px;
        }

        .hud-best {
          gap: 6px;
          min-height: 20px;
          padding: 4px 8px;
          font-size: 0.7rem;
        }

        .hud-best-value {
          font-size: 0.86rem;
        }

        .hud-coins {
          gap: 8px;
          min-height: 20px;
          font-size: 0.82rem;
        }

        .hud-coin-icon {
          width: 16px;
          height: 16px;
        }

        .hud-lives {
          gap: 4px;
          min-height: 20px;
        }

        .hud-life {
          width: 13px;
          height: 13px;
        }

        .icon-button {
          min-width: 44px;
          min-height: 44px;
          padding: 0 12px;
          border-radius: 14px;
          box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }
      }

      @media (orientation: landscape) and (max-height: 520px) {
        .hud {
          top: max(8px, env(safe-area-inset-top));
        }

        .hud-panel {
          max-width: min(48vw, 180px);
          padding: 8px 10px;
        }

        .hud-score {
          font-size: 0.82rem;
        }

        .hud-best {
          padding: 3px 7px;
          font-size: 0.66rem;
        }

        .hud-best-value {
          font-size: 0.8rem;
        }

        .hud-coins {
          font-size: 0.76rem;
        }

        .icon-button {
          min-width: 40px;
          min-height: 40px;
          padding: 0 10px;
        }

      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div class="hud" aria-live="polite">
      <div class="hud-panel">
        <div class="hud-stats">
          <div class="hud-row">
            <p id="hud-score" class="hud-score">Счет: 0</p>
            <div id="hud-coins" class="hud-coins" aria-label="Монеты: 0">
              <span class="hud-coin-label">Монеты:</span>
              <span id="hud-coins-value" class="hud-coin-value">0</span>
              <span class="hud-coin-icon" data-coin-icon aria-hidden="true"></span>
            </div>
          </div>
          <div class="hud-row">
            <div id="hud-lives" class="hud-lives" aria-label="Жизни: 3 из 5"></div>
            <div id="hud-best" class="hud-best" aria-label="Лучший счет: 0">
              <span class="hud-best-label">Рекорд</span>
              <span id="hud-best-value" class="hud-best-value">0</span>
            </div>
          </div>
        </div>
      </div>
      <button id="pause-button" class="icon-button" type="button" aria-label="Поставить игру на паузу">II</button>
    </div>

    <div id="overlay" class="overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
        <h1 id="overlay-title">Пауза</h1>
        <p id="overlay-message">Счет: 0</p>
        <section id="results-screen" class="results-screen" hidden aria-live="polite">
          <div class="results-grid">
            <div id="results-base-row" class="results-row">
              <span class="results-row-label">Базовый счет</span>
              <strong id="results-base-value" class="results-row-value">0</strong>
            </div>
            <div id="results-coins-row" class="results-row is-accent">
              <span class="results-row-label">
                <span class="hud-coin-icon" data-coin-icon aria-hidden="true"></span>
                Монеты
              </span>
              <strong id="results-coins-value" class="results-row-value is-coin">0</strong>
            </div>
            <div id="results-bonus-row" class="results-row is-accent">
              <span class="results-row-label">Бонус ×2</span>
              <strong id="results-bonus-value" class="results-row-value is-coin">+0</strong>
              <div id="results-burst" class="results-burst" aria-hidden="true"></div>
            </div>
          </div>
          <div id="results-final-card" class="results-final">
            <div class="results-final-label">Итоговый результат</div>
            <div id="results-final-value" class="results-final-value">0</div>
          </div>
          <div id="results-meta" class="results-meta">
            <div class="results-best">Рекорд: <strong id="results-best-value">0</strong></div>
            <div id="results-record-badge" class="results-record-badge" hidden>Новый рекорд!</div>
          </div>
        </section>
        <ul id="overlay-tips" class="overlay-tips" hidden></ul>
        <div class="modal-actions">
          <button id="overlay-primary-button" type="button">Продолжить</button>
          <button id="overlay-install-button" class="secondary" type="button" hidden>Установить</button>
          <button id="overlay-secondary-button" class="secondary" type="button" hidden>Начать заново</button>
          <button id="overlay-tertiary-button" class="secondary" type="button" hidden>Начать заново</button>
        </div>
        <div id="overlay-footer" class="modal-footer" hidden>
          <p id="overlay-footer-message"></p>
          <button id="overlay-footer-button" class="secondary" type="button">Установить</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
