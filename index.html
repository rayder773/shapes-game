<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero-G Shapes</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-a: #08111f;
        --bg-b: #11243c;
        --panel: rgba(7, 11, 18, 0.84);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f5f7fb;
        --muted: rgba(245, 247, 251, 0.72);
        --accent: #ffd166;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(84, 160, 255, 0.16), transparent 32%),
          linear-gradient(180deg, var(--bg-b), var(--bg-a));
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        position: relative;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(2, 4, 8, 0.62);
        backdrop-filter: blur(8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .modal {
        width: min(92vw, 360px);
        padding: 28px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.32);
        text-align: center;
      }

      .modal h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .modal p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .modal button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        font: inherit;
        font-weight: 700;
        color: #101522;
        background: linear-gradient(135deg, #ffe29a, var(--accent));
        cursor: pointer;
      }

      .modal button:hover {
        filter: brightness(1.03);
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="game-over-overlay" class="overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
        <h1 id="game-over-title">Game Over</h1>
        <p id="game-over-score">Score: 0</p>
        <button id="restart-button" type="button">Начать заново</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/planck/dist/planck.min.js"></script>
    <script type="module">
      import { World as ECSWorld } from "https://esm.sh/miniplex@2.0.0";

      const { Vec2, World: PhysicsWorld, Circle, Box, Polygon } = planck;

      // constants
      const SCALE = 30;
      const FIXED_DT = 1 / 60;
      const PLAYER_THRUST = 4;
      const MAX_SPEED = 8;
      const LINEAR_DAMPING = 0;
      const SHAPES = ["circle", "square", "triangle"];
      const COLORS = ["red", "blue", "green"];
      const FILL_STYLES = ["filled", "outline", "dashed"];
      const COLOR_MAP = {
        red: "#ff5f5f",
        blue: "#66a8ff",
        green: "#59e093",
      };
      const ENTITY_SIZE = 0.55;
      const WALL_THICKNESS = 0.35;
      const START_TOTAL_ENTITIES = 10;
      const MIN_TARGETS_AFTER_SCORE = 10;
      const MAX_TARGETS = 20;
      const SPAWN_PADDING = 1.8;
      const SAFE_SPAWN_PADDING = 2.3;
      const MAX_SPAWN_ATTEMPTS = 80;
      const INPUT_KEYS = new Set([
        "ArrowUp",
        "ArrowDown",
        "ArrowLeft",
        "ArrowRight",
        "w",
        "a",
        "s",
        "d",
        "W",
        "A",
        "S",
        "D",
      ]);

      // utils
      const randomItem = (items) => items[Math.floor(Math.random() * items.length)];
      const randomRange = (min, max) => min + Math.random() * (max - min);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      function worldToCanvas(worldX, worldY) {
        return {
          x: worldX * SCALE,
          y: canvas.height - worldY * SCALE,
        };
      }

      function canvasToWorld(canvasX, canvasY) {
        return {
          x: canvasX / SCALE,
          y: (canvas.height - canvasY) / SCALE,
        };
      }

      function areAllPropertiesDifferent(playerEntity, targetEntity) {
        return (
          playerEntity.shape !== targetEntity.shape &&
          playerEntity.color !== targetEntity.color &&
          playerEntity.fillStyle !== targetEntity.fillStyle
        );
      }

      function getTriangleVertices(size) {
        return [
          Vec2(0, size),
          Vec2(-size * 0.92, -size * 0.58),
          Vec2(size * 0.92, -size * 0.58),
        ];
      }

      function getShapeBounds(shape, size) {
        if (shape === "circle") {
          return { radius: size };
        }

        if (shape === "square") {
          return { radius: Math.hypot(size, size) };
        }

        return { radius: size * 1.05 };
      }

      function chooseDifferent(options, currentValue) {
        return randomItem(options.filter((value) => value !== currentValue));
      }

      // input state
      const rawInput = {
        up: false,
        down: false,
        left: false,
        right: false,
      };

      const inputState = {
        up: false,
        down: false,
        left: false,
        right: false,
      };

      function setInputForKey(key, isPressed) {
        if (key === "ArrowUp" || key === "w" || key === "W") rawInput.up = isPressed;
        if (key === "ArrowDown" || key === "s" || key === "S") rawInput.down = isPressed;
        if (key === "ArrowLeft" || key === "a" || key === "A") rawInput.left = isPressed;
        if (key === "ArrowRight" || key === "d" || key === "D") rawInput.right = isPressed;
      }

      window.addEventListener("keydown", (event) => {
        if (!INPUT_KEYS.has(event.key)) return;
        event.preventDefault();
        setInputForKey(event.key, true);
      });

      window.addEventListener("keyup", (event) => {
        if (!INPUT_KEYS.has(event.key)) return;
        event.preventDefault();
        setInputForKey(event.key, false);
      });

      window.addEventListener("blur", () => {
        rawInput.up = false;
        rawInput.down = false;
        rawInput.left = false;
        rawInput.right = false;
      });

      // DOM
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const overlay = document.getElementById("game-over-overlay");
      const gameOverScore = document.getElementById("game-over-score");
      const restartButton = document.getElementById("restart-button");

      // game state
      const game = {
        state: "playing",
        score: 0,
        entityId: 1,
        accumulator: 0,
        lastTime: 0,
        ecsWorld: null,
        physicsWorld: null,
        wallBodies: [],
        queries: null,
        contactQueue: [],
        pendingSafeCollisions: [],
        playerEntity: null,
      };

      // Miniplex ECS world
      function createECSWorld() {
        game.ecsWorld = new ECSWorld();
        game.queries = {
          bodies: game.ecsWorld.with("body"),
          renderables: game.ecsWorld.with("body", "renderable"),
          players: game.ecsWorld.with("body", "isPlayer"),
          targets: game.ecsWorld.with("body", "isTarget"),
        };
      }

      // Planck physics world
      function createPhysicsWorld() {
        game.physicsWorld = new PhysicsWorld(Vec2(0, 0));
        game.contactQueue = [];
        game.pendingSafeCollisions = [];
        game.wallBodies = [];
        game.physicsWorld.on("begin-contact", (contact) => {
          const fixtureA = contact.getFixtureA();
          const fixtureB = contact.getFixtureB();
          const entityA = fixtureA?.getBody()?.getUserData();
          const entityB = fixtureB?.getBody()?.getUserData();

          if (!entityA || !entityB) return;
          if (entityA.removed || entityB.removed) return;

          const playerEntity = entityA.isPlayer ? entityA : entityB.isPlayer ? entityB : null;
          const targetEntity = entityA.isTarget ? entityA : entityB.isTarget ? entityB : null;

          if (!playerEntity || !targetEntity) return;

          game.contactQueue.push({ playerEntity, targetEntity });
        });
      }

      function getWorldSize() {
        return {
          width: canvas.width / SCALE,
          height: canvas.height / SCALE,
        };
      }

      function clearPhysicsBodies() {
        if (!game.physicsWorld) return;
        for (let body = game.physicsWorld.getBodyList(); body; ) {
          const next = body.getNext();
          game.physicsWorld.destroyBody(body);
          body = next;
        }
      }

      // fixture creation functions
      function createFixtureDefinition(shape, size) {
        let geometry;

        if (shape === "circle") {
          geometry = Circle(size);
        } else if (shape === "square") {
          geometry = Box(size, size);
        } else {
          geometry = Polygon(getTriangleVertices(size));
        }

        return {
          shape: geometry,
          density: 1,
          friction: 0,
          restitution: 1,
        };
      }

      function replaceBodyFixture(entity, nextShape) {
        const body = entity.body;
        for (let fixture = body.getFixtureList(); fixture; ) {
          const next = fixture.getNext();
          body.destroyFixture(fixture);
          fixture = next;
        }
        body.createFixture(createFixtureDefinition(nextShape, entity.size));
      }

      function clampBodySpeed(body) {
        const velocity = body.getLinearVelocity();
        const speed = velocity.length();
        if (speed <= MAX_SPEED) return;
        body.setLinearVelocity(Vec2((velocity.x / speed) * MAX_SPEED, (velocity.y / speed) * MAX_SPEED));
      }

      // entity creation functions
      function createWallBodies() {
        const { width, height } = getWorldSize();
        const halfThickness = WALL_THICKNESS * 0.5;
        const walls = [
          { x: width * 0.5, y: -halfThickness, hx: width * 0.5, hy: halfThickness },
          { x: width * 0.5, y: height + halfThickness, hx: width * 0.5, hy: halfThickness },
          { x: -halfThickness, y: height * 0.5, hx: halfThickness, hy: height * 0.5 },
          { x: width + halfThickness, y: height * 0.5, hx: halfThickness, hy: height * 0.5 },
        ];

        game.wallBodies = walls.map((wall) => {
          const body = game.physicsWorld.createBody({
            type: "static",
            position: Vec2(wall.x, wall.y),
          });
          body.createFixture({
            shape: Box(wall.hx, wall.hy),
            restitution: 1,
            friction: 0,
          });
          return body;
        });
      }

      function rebuildWalls() {
        for (const body of game.wallBodies) {
          game.physicsWorld.destroyBody(body);
        }
        createWallBodies();
        keepBodiesInsideRoom();
      }

      function keepBodiesInsideRoom() {
        const { width, height } = getWorldSize();
        for (const entity of game.queries?.bodies ?? []) {
          const bounds = getShapeBounds(entity.shape, entity.size);
          const position = entity.body.getPosition();
          entity.body.setPosition(
            Vec2(
              clamp(position.x, bounds.radius, width - bounds.radius),
              clamp(position.y, bounds.radius, height - bounds.radius),
            ),
          );
        }
      }

      function generateProperties({ safeForPlayer = null } = {}) {
        if (!safeForPlayer) {
          return {
            shape: randomItem(SHAPES),
            color: randomItem(COLORS),
            fillStyle: randomItem(FILL_STYLES),
          };
        }

        return {
          shape: chooseDifferent(SHAPES, safeForPlayer.shape),
          color: chooseDifferent(COLORS, safeForPlayer.color),
          fillStyle: chooseDifferent(FILL_STYLES, safeForPlayer.fillStyle),
        };
      }

      function findSpawnPosition({ padding, shape, size }) {
        const { width, height } = getWorldSize();
        const radius = getShapeBounds(shape, size).radius;
        const minX = radius + WALL_THICKNESS + 0.2;
        const maxX = width - radius - WALL_THICKNESS - 0.2;
        const minY = radius + WALL_THICKNESS + 0.2;
        const maxY = height - radius - WALL_THICKNESS - 0.2;
        const blockers = [...game.queries.bodies];

        for (let attempt = 0; attempt < MAX_SPAWN_ATTEMPTS; attempt += 1) {
          const candidate = Vec2(randomRange(minX, maxX), randomRange(minY, maxY));
          let overlaps = false;

          for (const other of blockers) {
            const otherRadius = getShapeBounds(other.shape, other.size).radius;
            const otherPosition = other.body.getPosition();
            const distance = Math.hypot(candidate.x - otherPosition.x, candidate.y - otherPosition.y);
            if (distance < otherRadius + radius + padding) {
              overlaps = true;
              break;
            }
          }

          if (!overlaps) {
            return candidate;
          }
        }

        return Vec2(randomRange(minX, maxX), randomRange(minY, maxY));
      }

      function createFigureEntity({
        isPlayer = false,
        properties = null,
        safeForPlayer = null,
        spawnPadding = SPAWN_PADDING,
      } = {}) {
        const nextProperties = properties ?? generateProperties({ safeForPlayer });
        const position = findSpawnPosition({
          padding: spawnPadding,
          shape: nextProperties.shape,
          size: ENTITY_SIZE,
        });

        const body = game.physicsWorld.createBody({
          type: "dynamic",
          position,
          linearDamping: LINEAR_DAMPING,
          angularDamping: 0.15,
          bullet: true,
        });

        body.createFixture(createFixtureDefinition(nextProperties.shape, ENTITY_SIZE));
        body.setLinearVelocity(Vec2(randomRange(-3.5, 3.5), randomRange(-3.5, 3.5)));
        body.setAngularVelocity(randomRange(-1.4, 1.4));
        clampBodySpeed(body);

        const entity = {
          id: game.entityId++,
          body,
          shape: nextProperties.shape,
          color: nextProperties.color,
          fillStyle: nextProperties.fillStyle,
          size: ENTITY_SIZE,
          renderable: true,
          isPlayer,
          isTarget: !isPlayer,
          removed: false,
        };

        body.setUserData(entity);
        game.ecsWorld.add(entity);

        if (isPlayer) {
          game.playerEntity = entity;
        }

        return entity;
      }

      function removeEntity(entity) {
        if (!entity || entity.removed) return;
        entity.removed = true;
        if (entity.body) {
          entity.body.setUserData(null);
          game.physicsWorld.destroyBody(entity.body);
          entity.body = null;
        }
        game.ecsWorld.remove(entity);
      }

      // systems
      function InputSystem() {
        inputState.up = rawInput.up;
        inputState.down = rawInput.down;
        inputState.left = rawInput.left;
        inputState.right = rawInput.right;
      }

      function PlayerControlSystem() {
        if (game.state !== "playing") return;
        const player = game.playerEntity;
        if (!player || player.removed || !player.body) return;

        let forceX = 0;
        let forceY = 0;

        if (inputState.up) forceY += PLAYER_THRUST;
        if (inputState.down) forceY -= PLAYER_THRUST;
        if (inputState.left) forceX -= PLAYER_THRUST;
        if (inputState.right) forceX += PLAYER_THRUST;

        if (forceX === 0 && forceY === 0) return;
        player.body.applyForceToCenter(Vec2(forceX, forceY), true);
      }

      function PhysicsSystem() {
        if (game.state !== "playing") return;
        game.physicsWorld.step(FIXED_DT);

        for (const entity of game.queries.bodies) {
          if (!entity.body || entity.removed) continue;
          clampBodySpeed(entity.body);
        }
      }

      function ContactCollectionSystem() {
        if (game.contactQueue.length === 0) return [];

        const uniquePairs = new Map();

        for (const contact of game.contactQueue) {
          if (
            !contact.playerEntity ||
            !contact.targetEntity ||
            contact.playerEntity.removed ||
            contact.targetEntity.removed
          ) {
            continue;
          }

          const key = `${contact.playerEntity.id}:${contact.targetEntity.id}`;
          if (!uniquePairs.has(key)) {
            uniquePairs.set(key, contact);
          }
        }

        game.contactQueue.length = 0;
        return [...uniquePairs.values()];
      }

      function setGameOver() {
        game.state = "gameOver";
        rawInput.up = false;
        rawInput.down = false;
        rawInput.left = false;
        rawInput.right = false;
        inputState.up = false;
        inputState.down = false;
        inputState.left = false;
        inputState.right = false;
        gameOverScore.textContent = `Score: ${game.score}`;
        overlay.classList.add("visible");
        overlay.setAttribute("aria-hidden", "false");
      }

      function PlayerCollisionResolutionSystem(collisions) {
        if (game.state !== "playing") return;

        for (const collision of collisions) {
          const { playerEntity, targetEntity } = collision;

          if (
            !playerEntity ||
            !targetEntity ||
            playerEntity.removed ||
            targetEntity.removed ||
            !playerEntity.body ||
            !targetEntity.body
          ) {
            continue;
          }

          if (areAllPropertiesDifferent(playerEntity, targetEntity)) {
            game.pendingSafeCollisions.push(collision);
            continue;
          }

          setGameOver();
          return;
        }
      }

      function SafeCollisionSystem() {
        if (game.state !== "playing") {
          game.pendingSafeCollisions.length = 0;
          return;
        }

        while (game.pendingSafeCollisions.length > 0) {
          const collision = game.pendingSafeCollisions.shift();
          const playerEntity = collision.playerEntity;
          const targetEntity = collision.targetEntity;

          if (
            !playerEntity ||
            !targetEntity ||
            playerEntity.removed ||
            targetEntity.removed ||
            !playerEntity.body ||
            !targetEntity.body
          ) {
            continue;
          }

          playerEntity.shape = targetEntity.shape;
          playerEntity.color = targetEntity.color;
          playerEntity.fillStyle = targetEntity.fillStyle;
          replaceBodyFixture(playerEntity, playerEntity.shape);
          clampBodySpeed(playerEntity.body);
          removeEntity(targetEntity);
          game.score += 1;
        }
      }

      function SpawnSystem() {
        if (game.state !== "playing") return;

        const desiredTargets =
          game.score === 0
            ? START_TOTAL_ENTITIES - 1
            : Math.min(MIN_TARGETS_AFTER_SCORE + Math.floor(game.score / 3), MAX_TARGETS);

        while ([...game.queries.targets].filter((entity) => !entity.removed).length < desiredTargets) {
          createFigureEntity();
        }
      }

      function SafetySpawnSystem() {
        if (game.state !== "playing") return;
        const player = game.playerEntity;
        if (!player || player.removed) return;

        let hasSafeTarget = false;

        for (const entity of game.queries.targets) {
          if (entity.removed) continue;
          if (areAllPropertiesDifferent(player, entity)) {
            hasSafeTarget = true;
            break;
          }
        }

        if (hasSafeTarget) return;

        createFigureEntity({
          safeForPlayer: player,
          spawnPadding: SAFE_SPAWN_PADDING,
        });
      }

      // rendering functions
      function traceShape(shape, size) {
        ctx.beginPath();

        if (shape === "circle") {
          ctx.arc(0, 0, size * SCALE, 0, Math.PI * 2);
          return;
        }

        if (shape === "square") {
          const pixelSize = size * SCALE;
          ctx.rect(-pixelSize, -pixelSize, pixelSize * 2, pixelSize * 2);
          return;
        }

        const vertices = getTriangleVertices(size);
        ctx.moveTo(vertices[0].x * SCALE, -vertices[0].y * SCALE);
        for (let index = 1; index < vertices.length; index += 1) {
          ctx.lineTo(vertices[index].x * SCALE, -vertices[index].y * SCALE);
        }
        ctx.closePath();
      }

      function drawEntity(entity) {
        const position = entity.body.getPosition();
        const { x, y } = worldToCanvas(position.x, position.y);

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(-entity.body.getAngle());
        ctx.lineWidth = entity.isPlayer ? 4 : 2.2;
        ctx.strokeStyle = COLOR_MAP[entity.color];
        ctx.fillStyle = COLOR_MAP[entity.color];

        if (entity.fillStyle === "dashed") {
          ctx.setLineDash([9, 6]);
        } else {
          ctx.setLineDash([]);
        }

        traceShape(entity.shape, entity.size);

        if (entity.fillStyle === "filled") {
          ctx.globalAlpha = 0.9;
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.stroke();
        } else {
          ctx.stroke();
        }

        if (entity.isPlayer) {
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.fillStyle = "#ffffff";
          ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawRoomBorder() {
        ctx.save();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
        ctx.restore();
      }

      function drawHUD() {
        ctx.save();
        ctx.fillStyle = "#f7fbff";
        ctx.font = '700 24px "Trebuchet MS", "Segoe UI", sans-serif';
        ctx.fillText(`Score: ${game.score}`, 22, 36);

        if (game.playerEntity && !game.playerEntity.removed) {
          ctx.font = '500 14px "Trebuchet MS", "Segoe UI", sans-serif';
          ctx.fillStyle = "rgba(255, 255, 255, 0.74)";
          ctx.fillText(
            `Player: ${game.playerEntity.shape} / ${game.playerEntity.color} / ${game.playerEntity.fillStyle}`,
            22,
            58,
          );
        }
        ctx.restore();
      }

      function RenderSystem() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#13243d");
        gradient.addColorStop(1, "#07101d");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 90; i += 1) {
          const x = (i * 97) % canvas.width;
          const y = (i * 53) % canvas.height;
          ctx.fillStyle = "rgba(255, 255, 255, 0.018)";
          ctx.fillRect(x, y, 2, 2);
        }

        drawRoomBorder();

        for (const entity of game.queries.renderables) {
          if (entity.removed || !entity.body) continue;
          drawEntity(entity);
        }

        drawHUD();
      }

      // restart logic
      function hideOverlay() {
        overlay.classList.remove("visible");
        overlay.setAttribute("aria-hidden", "true");
      }

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        if (game.physicsWorld) {
          rebuildWalls();
        }
      }

      function restartGame() {
        hideOverlay();
        game.state = "playing";
        game.score = 0;
        game.entityId = 1;
        game.accumulator = 0;
        game.playerEntity = null;

        if (game.physicsWorld) {
          clearPhysicsBodies();
        }

        createECSWorld();
        createPhysicsWorld();
        createWallBodies();

        const playerEntity = createFigureEntity({
          isPlayer: true,
        });

        for (let i = 0; i < START_TOTAL_ENTITIES - 1; i += 1) {
          createFigureEntity();
        }

        if (![...game.queries.targets].some((entity) => areAllPropertiesDifferent(playerEntity, entity))) {
          createFigureEntity({
            safeForPlayer: playerEntity,
            spawnPadding: SAFE_SPAWN_PADDING,
          });
        }
      }

      // game loop
      function update() {
        InputSystem();
        PlayerControlSystem();
        PhysicsSystem();
        const collisions = ContactCollectionSystem();
        PlayerCollisionResolutionSystem(collisions);
        SafeCollisionSystem();
        SpawnSystem();
        SafetySpawnSystem();
      }

      function frame(time) {
        if (game.lastTime === 0) {
          game.lastTime = time;
        }

        const delta = Math.min((time - game.lastTime) / 1000, 0.1);
        game.lastTime = time;
        game.accumulator += delta;

        while (game.accumulator >= FIXED_DT) {
          update();
          game.accumulator -= FIXED_DT;
        }

        RenderSystem();
        requestAnimationFrame(frame);
      }

      restartButton.addEventListener("click", restartGame);
      window.addEventListener("resize", resizeCanvas);

      resizeCanvas();
      restartGame();
      requestAnimationFrame(frame);

      // architecture summary for quick reading:
      // components: body, shape, color, fillStyle, size, isPlayer, isTarget, renderable
      // systems: input, player control, physics, contact collection, collision resolution,
      // safe collision, spawn, safety spawn, render, restart
      // physics responsibilities delegated to Planck: movement, collision detection,
      // bounce response, shape contacts and wall collisions
    </script>
  </body>
