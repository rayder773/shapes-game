<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>AntiMatch</title>
    <meta name="theme-color" content="#09111d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: dark;
        --app-width: 100vw;
        --app-height: 100vh;
        --bg-base: #09111d;
        --bg-glow-a: rgba(72, 145, 255, 0.2);
        --bg-glow-b: rgba(77, 208, 154, 0.15);
        --panel: rgba(8, 12, 20, 0.82);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.72);
        --accent: #ffd166;
        --safe-top: max(16px, env(safe-area-inset-top));
        --safe-right: max(16px, env(safe-area-inset-right));
        --safe-bottom: max(16px, env(safe-area-inset-bottom));
        --safe-left: max(16px, env(safe-area-inset-left));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        width: var(--app-width);
        height: var(--app-height);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        background:
          radial-gradient(circle at 18% 18%, var(--bg-glow-a), transparent 28%),
          radial-gradient(circle at 84% 78%, var(--bg-glow-b), transparent 30%),
          linear-gradient(180deg, #12243b, var(--bg-base));
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: fixed;
        top: var(--safe-top);
        left: var(--safe-left);
        right: var(--safe-right);
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        pointer-events: none;
      }

      .hud-panel {
        max-width: min(70vw, 560px);
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: rgba(8, 12, 20, 0.28);
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
        pointer-events: auto;
      }

      .hud-score {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .hud-player {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.35;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hud-player[data-compact="true"] {
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .icon-button,
      .modal button {
        appearance: none;
        border: 0;
        font: inherit;
        cursor: pointer;
        touch-action: manipulation;
      }

      .icon-button {
        min-width: 56px;
        min-height: 56px;
        border-radius: 18px;
        padding: 0 18px;
        font-weight: 800;
        color: rgba(255, 247, 223, 0.96);
        background: rgba(255, 209, 102, 0.22);
        border: 1px solid rgba(255, 209, 102, 0.42);
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
      }

      .icon-button:active,
      .modal button:active {
        transform: translateY(1px) scale(0.99);
      }

      .overlay {
        z-index: 4;
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(2, 4, 8, 0.62);
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .overlay[data-layout="sheet"] {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding:
          calc(var(--safe-top) + 16px)
          calc(var(--safe-right) + 16px)
          calc(var(--safe-bottom) + 10px)
          calc(var(--safe-left) + 16px);
      }

      .modal {
        width: min(100%, 380px);
        margin-inline: auto;
        padding: 28px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        text-align: center;
        touch-action: manipulation;
      }

      .overlay[data-layout="sheet"] .modal {
        width: min(100%, 460px);
        border-radius: 26px 26px 18px 18px;
        padding: 24px 22px 20px;
        text-align: left;
        animation: install-sheet-in 180ms ease;
      }

      .overlay[data-variant="ios-hint"] .modal,
      .overlay[data-variant="ios-hint"] .modal p {
        text-align: center;
      }

      .overlay[data-variant="ios-hint"] .overlay-tips {
        margin-inline: auto;
        width: fit-content;
      }

      .modal h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .modal p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.45;
      }

      .overlay-tips {
        margin: -8px 0 22px;
        padding-left: 20px;
        color: rgba(244, 247, 251, 0.84);
        text-align: left;
        line-height: 1.5;
      }

      .overlay-tips[hidden] {
        display: none;
      }

      .overlay[data-layout="sheet"] .overlay-tips {
        margin: -6px 0 18px;
      }

      .modal button {
        border-radius: 999px;
        padding: 12px 22px;
        font-weight: 700;
        color: #101522;
        background: linear-gradient(135deg, #ffe39b, var(--accent));
      }

      .modal button:hover {
        filter: brightness(1.03);
      }

      .modal-actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .overlay[data-layout="sheet"] .modal-actions {
        justify-content: stretch;
      }

      .modal button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.12);
      }

      @keyframes install-sheet-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .app-hidden {
        display: none !important;
      }

      .modal button[hidden] {
        display: none;
      }

      .settings-page {
        width: 100%;
        min-height: var(--app-height);
        display: grid;
        place-items: center;
        padding:
          calc(var(--safe-top) + 12px)
          calc(var(--safe-right) + 12px)
          calc(var(--safe-bottom) + 12px)
          calc(var(--safe-left) + 12px);
      }

      .settings-card {
        width: min(100%, 520px);
        padding: 28px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(12px);
      }

      .settings-title {
        margin: 0 0 10px;
        font-size: clamp(1.9rem, 4vw, 2.5rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .settings-subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.45;
      }

      .settings-form {
        display: grid;
        gap: 18px;
      }

      .settings-slider {
        display: grid;
        gap: 10px;
      }

      .settings-slider-label {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        font-weight: 700;
      }

      .settings-slider-value {
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .settings-slider input[type="range"] {
        width: 100%;
        margin: 0;
        accent-color: var(--accent);
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .settings-button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        font: inherit;
        font-weight: 700;
        color: #101522;
        background: linear-gradient(135deg, #ffe39b, var(--accent));
        cursor: pointer;
        touch-action: manipulation;
      }

      .settings-button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.12);
      }

      .settings-button:active {
        transform: translateY(1px) scale(0.99);
      }

      @media (max-width: 720px) {
        .hud {
          gap: 12px;
        }

        .hud-panel {
          max-width: none;
          flex: 1;
        }

        .settings-card {
          padding: 24px 18px;
        }

        .settings-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .modal-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .modal button,
        .settings-button {
          width: 100%;
        }
      }

      @media (pointer: coarse), (hover: none) {
        .hud {
          align-items: center;
          gap: 10px;
        }

        .hud-panel {
          max-width: min(56vw, 220px);
          padding: 10px 12px;
          border-radius: 14px;
          background: rgba(8, 12, 20, 0.22);
          box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .hud-score {
          font-size: 0.9rem;
          letter-spacing: 0.03em;
        }

        .hud-player {
          margin-top: 6px;
          font-size: 0.74rem;
          line-height: 1.2;
          color: rgba(244, 247, 251, 0.86);
        }

        .icon-button {
          min-width: 44px;
          min-height: 44px;
          padding: 0 12px;
          border-radius: 14px;
          box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }
      }

      @media (orientation: landscape) and (max-height: 520px) {
        .hud {
          top: max(8px, env(safe-area-inset-top));
        }

        .hud-panel {
          max-width: min(48vw, 180px);
          padding: 8px 10px;
        }

        .hud-score {
          font-size: 0.82rem;
        }

        .icon-button {
          min-width: 40px;
          min-height: 40px;
          padding: 0 10px;
        }

      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div class="hud" aria-live="polite">
      <div class="hud-panel">
        <p id="hud-score" class="hud-score">Счет: 0</p>
        <p id="hud-player" class="hud-player">Игрок: -</p>
      </div>
      <button id="pause-button" class="icon-button" type="button" aria-label="Поставить игру на паузу">II</button>
    </div>

    <div id="overlay" class="overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
        <h1 id="overlay-title">Пауза</h1>
        <p id="overlay-message">Счет: 0</p>
        <ul id="overlay-tips" class="overlay-tips" hidden></ul>
        <div class="modal-actions">
          <button id="overlay-primary-button" type="button">Продолжить</button>
          <button id="overlay-install-button" class="secondary" type="button" hidden>Установить</button>
          <button id="overlay-secondary-button" class="secondary" type="button" hidden>Начать заново</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
