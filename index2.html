<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure Slash</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.18), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(34, 197, 94, 0.12), transparent 28%),
        #111827;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.62);
      z-index: 10;
    }

    .modal-overlay.is-visible {
      display: grid;
    }

    .modal {
      width: min(420px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      padding: 28px;
      color: white;
      background: rgba(17, 24, 39, 0.95);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .modal h1 {
      margin: 0 0 8px;
      font-size: 42px;
      line-height: 1;
    }

    .modal p {
      margin: 0 0 22px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .modal button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      color: white;
      background: #2563eb;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="gameOverModal" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
      <h1 id="gameOverTitle">Game Over</h1>
      <p id="finalScore">Score: 0</p>
      <button id="restartButton">Начать заново</button>
    </div>
  </div>

  <script type="module">
    import planck from "https://esm.sh/planck@1.5.0";
    import { World as ECSWorld } from "https://esm.sh/miniplex@2.0.0";

    // =========================================================
    // constants
    // =========================================================

    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const modal = document.querySelector("#gameOverModal");
    const finalScore = document.querySelector("#finalScore");
    const restartButton = document.querySelector("#restartButton");

    const SCALE = 30;
    const FIXED_DT = 1 / 60;
    const MAX_FRAME_DT = 1 / 20;

    const INITIAL_TOTAL_FIGURES = 10;
    const MIN_TARGET_COUNT = 10;
    const MAX_TARGET_COUNT = 20;

    const PLAYER_FORCE = 18;
    const MAX_SPEED = 8;
    const SPAWN_MIN_DISTANCE = 2.2;

    const SIZE_PX = 42;
    const SIZE_M = SIZE_PX / SCALE;

    const SHAPES = ["circle", "square", "triangle"];
    const COLORS = ["red", "blue", "green"];
    const FILL_STYLES = ["filled", "outline", "dashed"];

    const COLOR_MAP = {
      red: "#ef4444",
      blue: "#3b82f6",
      green: "#22c55e",
    };

    // =========================================================
    // mutable game state
    // =========================================================

    let ecsWorld;
    let physicsWorld;
    let walls = [];
    let playerContacts = [];
    let score = 0;
    let gameState = "playing";
    let lastTime = performance.now();
    let accumulator = 0;
    let nextEntityId = 1;

    const input = {
      up: false,
      down: false,
      left: false,
      right: false,
    };

    // =========================================================
    // utils
    // =========================================================

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function clampVectorLength(vector, maxLength) {
      const length = vector.length();
      if (length <= maxLength) return vector;
      vector.mul(maxLength / length);
      return vector;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.floor(window.innerWidth * dpr);
      const height = Math.floor(window.innerHeight * dpr);

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (physicsWorld) {
          recreateWalls();
        }
      }
    }

    function getCssWidth() {
      return canvas.width / (window.devicePixelRatio || 1);
    }

    function getCssHeight() {
      return canvas.height / (window.devicePixelRatio || 1);
    }

    function getWorldWidth() {
      return getCssWidth() / SCALE;
    }

    function getWorldHeight() {
      return getCssHeight() / SCALE;
    }

    function worldToCanvas(position) {
      return {
        x: position.x * SCALE,
        y: getCssHeight() - position.y * SCALE,
      };
    }

    function canvasToWorld(x, y) {
      return planck.Vec2(x / SCALE, (getCssHeight() - y) / SCALE);
    }

    function getPlayer() {
      for (const entity of ecsWorld.with("isPlayer", "body")) {
        return entity;
      }

      return null;
    }

    function getTargetCount() {
      let count = 0;

      for (const _entity of ecsWorld.with("isTarget", "body")) {
        count++;
      }

      return count;
    }

    function isSafeTargetForPlayer(player, target) {
      return (
        player.shape !== target.shape &&
        player.color !== target.color &&
        player.fillStyle !== target.fillStyle
      );
    }

    function getRandomProps() {
      return {
        shape: randomItem(SHAPES),
        color: randomItem(COLORS),
        fillStyle: randomItem(FILL_STYLES),
      };
    }

    function getGuaranteedSafeProps(player) {
      return {
        shape: randomItem(SHAPES.filter((shape) => shape !== player.shape)),
        color: randomItem(COLORS.filter((color) => color !== player.color)),
        fillStyle: randomItem(FILL_STYLES.filter((fillStyle) => fillStyle !== player.fillStyle)),
      };
    }

    function findSpawnPosition() {
      const margin = SIZE_M * 1.8;
      const worldWidth = getWorldWidth();
      const worldHeight = getWorldHeight();
      const entities = [...ecsWorld.with("body")];

      for (let attempt = 0; attempt < 120; attempt++) {
        const position = planck.Vec2(
          randomBetween(margin, Math.max(margin, worldWidth - margin)),
          randomBetween(margin, Math.max(margin, worldHeight - margin)),
        );

        let tooClose = false;

        for (const entity of entities) {
          const otherPosition = entity.body.getPosition();
          const distance = planck.Vec2.sub(position, otherPosition).length();

          if (distance < SPAWN_MIN_DISTANCE) {
            tooClose = true;
            break;
          }
        }

        if (!tooClose) {
          return position;
        }
      }

      return planck.Vec2(
        randomBetween(margin, Math.max(margin, worldWidth - margin)),
        randomBetween(margin, Math.max(margin, worldHeight - margin)),
      );
    }

    function randomVelocity() {
      return planck.Vec2(randomBetween(-3.2, 3.2), randomBetween(-3.2, 3.2));
    }

    // =========================================================
    // Planck physics world
    // =========================================================

    function createPhysicsWorld() {
      const world = new planck.World(planck.Vec2(0, 0));

      world.on("begin-contact", (contact) => {
        if (gameState !== "playing") return;

        const bodyA = contact.getFixtureA().getBody();
        const bodyB = contact.getFixtureB().getBody();
        const entityA = bodyA.getUserData();
        const entityB = bodyB.getUserData();

        if (!entityA || !entityB) return;

        const aIsPlayer = entityA.isPlayer === true;
        const bIsPlayer = entityB.isPlayer === true;

        if (aIsPlayer && entityB.isTarget) {
          playerContacts.push({ player: entityA, target: entityB });
        } else if (bIsPlayer && entityA.isTarget) {
          playerContacts.push({ player: entityB, target: entityA });
        }
      });

      return world;
    }

    function recreateWalls() {
      for (const wall of walls) {
        physicsWorld.destroyBody(wall);
      }

      walls = [];
      createWalls();
    }

    function createWalls() {
      const worldWidth = getWorldWidth();
      const worldHeight = getWorldHeight();
      const thickness = 0.5;

      const wallDefs = [
        { x: worldWidth / 2, y: -thickness / 2, hx: worldWidth / 2, hy: thickness / 2 },
        { x: worldWidth / 2, y: worldHeight + thickness / 2, hx: worldWidth / 2, hy: thickness / 2 },
        { x: -thickness / 2, y: worldHeight / 2, hx: thickness / 2, hy: worldHeight / 2 },
        { x: worldWidth + thickness / 2, y: worldHeight / 2, hx: thickness / 2, hy: worldHeight / 2 },
      ];

      for (const wallDef of wallDefs) {
        const wall = physicsWorld.createBody({
          type: "static",
          position: planck.Vec2(wallDef.x, wallDef.y),
        });

        wall.createFixture(planck.Box(wallDef.hx, wallDef.hy), {
          friction: 0,
          restitution: 1,
        });

        walls.push(wall);
      }
    }

    // =========================================================
    // fixtures
    // =========================================================

    function createShapeFixture(shape, sizeM) {
      if (shape === "circle") {
        return planck.Circle(sizeM / 2);
      }

      if (shape === "square") {
        return planck.Box(sizeM / 2, sizeM / 2);
      }

      if (shape === "triangle") {
        const height = sizeM;
        const halfWidth = sizeM / 2;

        return planck.Polygon([
          planck.Vec2(0, height / 2),
          planck.Vec2(-halfWidth, -height / 2),
          planck.Vec2(halfWidth, -height / 2),
        ]);
      }

      throw new Error(`Unknown shape: ${shape}`);
    }

    function clearFixtures(body) {
      let fixture = body.getFixtureList();

      while (fixture) {
        const next = fixture.getNext();
        body.destroyFixture(fixture);
        fixture = next;
      }
    }

    function applyFixtureForEntity(entity) {
      clearFixtures(entity.body);

      entity.body.createFixture(createShapeFixture(entity.shape, entity.size), {
        density: 1,
        friction: 0,
        restitution: 1,
      });

      entity.body.resetMassData();
    }

    // =========================================================
    // entity creation functions
    // =========================================================

    function createFigureEntity({ isPlayer = false, props = getRandomProps(), position = findSpawnPosition() } = {}) {
      const body = physicsWorld.createBody({
        type: "dynamic",
        position,
        angle: randomBetween(0, Math.PI * 2),
        linearDamping: 0.02,
        angularDamping: 0.02,
        bullet: true,
      });

      const entity = ecsWorld.add({
        id: nextEntityId++,
        body,
        shape: props.shape,
        color: props.color,
        fillStyle: props.fillStyle,
        size: SIZE_M,
        renderable: true,
        ...(isPlayer ? { isPlayer: true } : { isTarget: true }),
      });

      body.setUserData(entity);
      applyFixtureForEntity(entity);
      body.setLinearVelocity(randomVelocity());
      body.setAngularVelocity(randomBetween(-2.2, 2.2));

      return entity;
    }

    function destroyFigureEntity(entity) {
      if (!entity || !entity.body) return;

      physicsWorld.destroyBody(entity.body);
      ecsWorld.remove(entity);
    }

    function createInitialEntities() {
      for (let i = 0; i < INITIAL_TOTAL_FIGURES; i++) {
        createFigureEntity({ isPlayer: i === 0 });
      }

      safetySpawnSystem();
    }

    // =========================================================
    // systems
    // =========================================================

    function inputSystem(event, isPressed) {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") input.up = isPressed;
      if (key === "arrowdown" || key === "s") input.down = isPressed;
      if (key === "arrowleft" || key === "a") input.left = isPressed;
      if (key === "arrowright" || key === "d") input.right = isPressed;
    }

    function playerControlSystem() {
      if (gameState !== "playing") return;

      const player = getPlayer();
      if (!player) return;

      const force = planck.Vec2(0, 0);

      if (input.up) force.y += PLAYER_FORCE;
      if (input.down) force.y -= PLAYER_FORCE;
      if (input.left) force.x -= PLAYER_FORCE;
      if (input.right) force.x += PLAYER_FORCE;

      if (force.lengthSquared() > 0) {
        player.body.applyForceToCenter(force, true);
      }
    }

    function physicsSystem(dt) {
      if (gameState !== "playing") return;
      physicsWorld.step(dt);
    }

    function maxSpeedSystem() {
      for (const entity of ecsWorld.with("body")) {
        const velocity = entity.body.getLinearVelocity();

        if (velocity.length() > MAX_SPEED) {
          entity.body.setLinearVelocity(clampVectorLength(velocity, MAX_SPEED));
        }
      }
    }

    function playerCollisionResolutionSystem() {
      if (gameState !== "playing") {
        playerContacts.length = 0;
        return;
      }

      const contacts = playerContacts.splice(0);
      const handledTargets = new Set();

      for (const contact of contacts) {
        const { player, target } = contact;

        if (!player?.body || !target?.body || handledTargets.has(target)) {
          continue;
        }

        handledTargets.add(target);

        if (isSafeTargetForPlayer(player, target)) {
          safeCollisionSystem(player, target);
        } else {
          gameOverSystem();
          break;
        }
      }
    }

    function safeCollisionSystem(player, target) {
      player.shape = target.shape;
      player.color = target.color;
      player.fillStyle = target.fillStyle;

      applyFixtureForEntity(player);
      destroyFigureEntity(target);

      score += 1;

      safetySpawnSystem();
    }

    function spawnSystem() {
      if (gameState !== "playing") return;

      let targetCount = getTargetCount();
      const desiredCount = Math.min(MAX_TARGET_COUNT, MIN_TARGET_COUNT + Math.floor(score / 3));

      while (targetCount < desiredCount) {
        createFigureEntity({ isPlayer: false });
        targetCount++;
      }
    }

    function safetySpawnSystem() {
      if (gameState !== "playing") return;

      const player = getPlayer();
      if (!player) return;

      for (const target of ecsWorld.with("isTarget", "body")) {
        if (isSafeTargetForPlayer(player, target)) {
          return;
        }
      }

      createFigureEntity({
        isPlayer: false,
        props: getGuaranteedSafeProps(player),
        position: findSpawnPosition(),
      });
    }

    function gameOverSystem() {
      gameState = "gameOver";
      playerContacts.length = 0;

      finalScore.textContent = `Score: ${score}`;
      modal.classList.add("is-visible");
      modal.setAttribute("aria-hidden", "false");
    }

    function renderSystem() {
      const width = getCssWidth();
      const height = getCssHeight();

      ctx.clearRect(0, 0, width, height);
      drawRoomBorder(width, height);

      for (const entity of ecsWorld.with("renderable", "body")) {
        drawFigure(entity);
      }

      drawHud();
    }

    // =========================================================
    // rendering functions
    // =========================================================

    function drawRoomBorder(width, height) {
      ctx.save();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.16)";
      ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, width - 2, height - 2);
      ctx.restore();
    }

    function drawFigure(entity) {
      const position = worldToCanvas(entity.body.getPosition());
      const sizePx = entity.size * SCALE;
      const half = sizePx / 2;
      const color = COLOR_MAP[entity.color];

      ctx.save();
      ctx.translate(position.x, position.y);
      ctx.rotate(-entity.body.getAngle());

      ctx.lineWidth = entity.isPlayer ? 5 : 3;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.setLineDash(entity.fillStyle === "dashed" ? [8, 7] : []);

      beginFigurePath(entity.shape, half, sizePx);

      if (entity.fillStyle === "filled") {
        ctx.globalAlpha = 0.9;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.stroke();
      } else {
        ctx.stroke();
      }

      ctx.setLineDash([]);

      if (entity.isPlayer) {
        drawPlayerMarker(half);
      }

      ctx.restore();
    }

    function beginFigurePath(shape, half, sizePx) {
      ctx.beginPath();

      if (shape === "circle") {
        ctx.arc(0, 0, half, 0, Math.PI * 2);
      }

      if (shape === "square") {
        ctx.rect(-half, -half, sizePx, sizePx);
      }

      if (shape === "triangle") {
        ctx.moveTo(0, -half);
        ctx.lineTo(-half, half);
        ctx.lineTo(half, half);
        ctx.closePath();
      }
    }

    function drawPlayerMarker(half) {
      ctx.save();
      ctx.setLineDash([]);
      ctx.fillStyle = "white";
      ctx.strokeStyle = "rgba(0, 0, 0, 0.35)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -half - 9, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawHud() {
      const player = getPlayer();

      ctx.save();
      ctx.fillStyle = "white";
      ctx.font = "700 22px system-ui, sans-serif";
      ctx.fillText(`Score: ${score}`, 20, 36);

      if (player) {
        ctx.font = "500 14px system-ui, sans-serif";
        ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
        ctx.fillText(
          `Player: ${player.shape} / ${player.color} / ${player.fillStyle}`,
          20,
          60,
        );
      }

      ctx.restore();
    }

    // =========================================================
    // restart logic
    // =========================================================

    function clearWorlds() {
      playerContacts.length = 0;

      if (ecsWorld && physicsWorld) {
        for (const entity of [...ecsWorld.with("body")]) {
          physicsWorld.destroyBody(entity.body);
          ecsWorld.remove(entity);
        }
      }

      walls.length = 0;
    }

    function restartGame() {
      clearWorlds();

      ecsWorld = new ECSWorld();
      physicsWorld = createPhysicsWorld();
      walls = [];
      score = 0;
      gameState = "playing";
      nextEntityId = 1;
      accumulator = 0;
      lastTime = performance.now();

      modal.classList.remove("is-visible");
      modal.setAttribute("aria-hidden", "true");

      resizeCanvas();
      createWalls();
      createInitialEntities();
    }

    // =========================================================
    // game loop
    // =========================================================

    function fixedUpdate(dt) {
      playerControlSystem();
      physicsSystem(dt);
      playerCollisionResolutionSystem();
      maxSpeedSystem();
      spawnSystem();
      safetySpawnSystem();
    }

    function gameLoop(now) {
      resizeCanvas();

      const frameDt = Math.min((now - lastTime) / 1000, MAX_FRAME_DT);
      lastTime = now;
      accumulator += frameDt;

      while (accumulator >= FIXED_DT) {
        fixedUpdate(FIXED_DT);
        accumulator -= FIXED_DT;
      }

      renderSystem();
      requestAnimationFrame(gameLoop);
    }

    // =========================================================
    // browser events
    // =========================================================

    window.addEventListener("keydown", (event) => {
      inputSystem(event, true);
    });

    window.addEventListener("keyup", (event) => {
      inputSystem(event, false);
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
    });

    restartButton.addEventListener("click", () => {
      restartGame();
    });

    // =========================================================
    // start
    // =========================================================

    restartGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
