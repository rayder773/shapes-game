<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
  </head>
  <body>
    <script>
      (function () {
        var pathSegments = window.location.pathname.split("/");
        var repoBase = pathSegments.length > 1 ? "/" + pathSegments[1] + "/" : "/";
        var appPath = "/" + pathSegments.slice(2).join("/");
        var query = window.location.search.slice(1);
        var hash = window.location.hash.slice(1);
        var nextUrl = repoBase + "?p=" + encodeURIComponent(appPath || "/");

        if (query) {
          nextUrl += "&q=" + encodeURIComponent(query);
        }

        if (hash) {
          nextUrl += "&h=" + encodeURIComponent(hash);
        }

        window.location.replace(nextUrl);
      })();
    </script>
  </body>
</html>
